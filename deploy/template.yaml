AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: chq — ClickHouse query performance report (weekly Slack)

Parameters:
  ClickHouseHost:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /chq/clickhouse-host
  ClickHouseUser:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /chq/clickhouse-user
  ClickHousePassword:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /chq/clickhouse-password
  SlackWebhookUrl:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /chq/slack-webhook

Resources:
  ChqReportFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: chq.handler.lambda_handler
      Runtime: python3.12
      Timeout: 300
      MemorySize: 256
      CodeUri: ../
      Environment:
        Variables:
          CHQ_HOST: !Ref ClickHouseHost
          CHQ_USER: !Ref ClickHouseUser
          CHQ_PASSWORD: !Ref ClickHousePassword
          CHQ_SLACK_WEBHOOK: !Ref SlackWebhookUrl
          CHQ_FORMAT: slack
          CHQ_SECURE: "true"
      Events:
        WeeklyReport:
          Type: Schedule
          Properties:
            Schedule: cron(0 9 ? * MON *)
            Description: Weekly ClickHouse performance report
